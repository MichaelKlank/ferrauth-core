name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# New pushes supersede older runs on the same ref (e.g. extra commits on a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  # JS actions still on Node 20 (e.g. rustsec/audit-check, romeovs/lcov-reporter) until they ship Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # cargo-husky installs hooks from .cargo-husky/hooks only for local dev; skip on CI runners.
  CARGO_HUSKY_DONT_INSTALL_HOOKS: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
          components: rustfmt
      - run: cargo fmt --all -- --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
          components: clippy
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
#        os: [ubuntu-latest, windows-latest, macos-latest] # windows disabled because speed issues depending on ssl build time
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: shogo82148/actions-setup-perl@22ab01e83d59dc1abe1796fd8f338da7e7f2d033 # v1.38.1
        if: runner.os == 'Windows'
        with:
          distribution: strawberry
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
      - run: cargo test --all-features --locked
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview
      - uses: taiki-e/install-action@21eb0b6228fa6252dafdd9c82e7516ad2328c775 # refs/tags/cargo-llvm-cov
        with:
          tool: cargo-llvm-cov
      - name: Run tests with coverage (LCOV)
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Coverage summary and minimum line coverage
        env:
          MIN_LINE_COVERAGE_PERCENT: "80"
        run: |
          set -euo pipefail
          cargo llvm-cov report --json > coverage-report.json
          LINE_PCT=$(jq -r '.data[0].totals.lines.percent' coverage-report.json)
          COVERED=$(jq -r '.data[0].totals.lines.covered' coverage-report.json)
          TOTAL=$(jq -r '.data[0].totals.lines.count' coverage-report.json)
          echo ""
          echo "=========================================="
          echo "LINE COVERAGE: ${LINE_PCT}%  (${COVERED} / ${TOTAL} lines)"
          echo "REQUIRED MIN:  ${MIN_LINE_COVERAGE_PERCENT}%"
          echo "=========================================="
          echo ""
          jq -r --arg min "${MIN_LINE_COVERAGE_PERCENT}" '
            .data[0].totals as $t |
            "## Coverage summary\n\n" +
            "| Metric | Covered | Total | % |\n" +
            "|--------|--------:|------:|:-:|\n" +
            "| Lines | \($t.lines.covered) | \($t.lines.count) | \($t.lines.percent)% |\n" +
            ("*(CI requires at least **" + $min + "%** line coverage.)*\n\n") +
            "| Regions | \($t.regions.covered) | \($t.regions.count) | \($t.regions.percent)% |\n" +
            "| Functions | \($t.functions.covered) | \($t.functions.count) | \($t.functions.percent)% |\n"
          ' coverage-report.json | tee -a "$GITHUB_STEP_SUMMARY"
          if jq -e --argjson min "${MIN_LINE_COVERAGE_PERCENT}" \
            '.data[0].totals.lines.percent < $min' coverage-report.json >/dev/null
          then
            echo "::error title=Line coverage below minimum::Workspace line coverage is ${LINE_PCT}% (${COVERED}/${TOTAL} lines) but CI requires at least ${MIN_LINE_COVERAGE_PERCENT}%. Add or extend tests for uncovered code under src/, then re-run cargo llvm-cov locally."
            exit 1
          fi
      - uses: romeovs/lcov-reporter-action@87a815f34ec27a5826abba44ce09bbc688da58fd # v0.4.0
        with:
          lcov-file: lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
        with: { files: lcov.info }